<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RAKKIPANDA</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
      border: 4px solid transparent; 
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, background-color 0.2s;
    }

    #reader.scan-success {
      border-color: #22c55e !important;
      background-color: rgba(34, 197, 94, 0.2);
    }

    select, input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .manual-box {
      margin-top: 10px;
    }

    .log {
      margin-top: 20px;
      max-width: 400px;
      margin-inline: auto;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #334155;
      font-size: 14px;
      text-align: left;
    }

    th {
      background: #334155;
    }

    #statusTerakhir {
      padding: 10px;
      font-weight: bold;
      color: #4ade80;
    }

    .custom-alert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e293b;
      border: 2px solid #ef4444;
      padding: 20px;
      border-radius: 15px;
      z-index: 9999;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 80%;
      max-width: 300px;
    }
    .custom-alert h2 { color: #ef4444; margin-top: 0; }
    .custom-alert button { background: #ef4444; margin-top: 15px; width: 100%; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9998; }
  </style>
</head>

<body>

<div id="overlay" class="overlay"></div>
<div id="customAlert" class="custom-alert">
  <h2 id="alertTitle">⚠️ PERINGATAN</h2>
  <p id="alertMsg"></p>
  <button onclick="closeAlert()">OK</button>
</div>

<h1>RAKKIPANDA</h1>

<select id="mode" onchange="updateNameList()">
  <option value="PICKER">PICKER</option>
  <option value="CHECKER">CHECKER</option>
</select>

<select id="name"></select>

<br>

<button onclick="startScanner()">▶️ Start Scan</button>
<button onclick="stopScanner()">⏹ Stop</button>

<div id="reader"></div>

<div class="manual-box">
  <input type="text" id="manualInput" placeholder="Input Resi / Tipe">
  <button onclick="submitManual()">Kirim</button>
</div>

<div class="log">
  <table>
    <thead>
      <tr>
        <th style="text-align: center;">STATUS OPERASIONAL</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td id="statusTerakhir" style="text-align: center;">Siap Scan...</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  let scanner;
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyuAek37vjfb1daYoZ5Atg4rURNQHn6CuLVT43q7a7TkmbrWNG5AYUFsKBXOrK04u5a/exec";

  const audioDouble = new Audio("https://raw.githubusercontent.com/zeryrakkipanda-sketch/doubleeee/main/double.mp4");
  const audioSalah = new Audio("https://raw.githubusercontent.com/zeryrakkipanda-sketch/salah-tipe/main/salah%20tipe.mp4");
  const audioKurang = new Audio("https://raw.githubusercontent.com/zeryrakkipanda-sketch/kurang-tipe/main/kurang%20barang.mp4");

  const pickerNames = ["Ayu", "Risa", "Lia"];
  const checkerNames = ["Ayu", "Risa", "Lia"];
  let scannedList = new Set();
  let isLocked = false; // Kunci untuk jeda scan

  function updateNameList() {
    const mode = document.getElementById("mode").value;
    const nameSelect = document.getElementById("name");
    nameSelect.innerHTML = "";
    let list = mode === "PICKER" ? pickerNames : checkerNames;
    list.forEach(n => {
      let opt = document.createElement("option");
      opt.value = n;
      opt.text = n;
      nameSelect.appendChild(opt);
    });
    scannedList.clear();
  }
  updateNameList();

  function log(text) { document.getElementById("statusTerakhir").innerHTML = text; }

  function showAlert(msg) {
    document.getElementById("alertMsg").innerText = msg;
    document.getElementById("overlay").style.display = "block";
    document.getElementById("customAlert").style.display = "block";
  }

  function closeAlert() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("customAlert").style.display = "none";
  }

  function playSuccessSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); 
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
  }

  function playErrorRekaman(message) {
    let audio = null;
    const msg = message.toUpperCase();
    if (msg.includes("DOUBLE")) audio = audioDouble;
    else if (msg.includes("SALAH TIPE")) audio = audioSalah;
    else if (msg.includes("KURANG TIPE") || msg.includes("KURANG BARANG")) audio = audioKurang;

    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(e => console.log(e));
    }
  }

  function triggerVisualSuccess() {
    const readerElement = document.getElementById("reader");
    readerElement.classList.add("scan-success");
    setTimeout(() => { readerElement.classList.remove("scan-success"); }, 150); 
  }

  function startScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 60, qrbox: 250 }, (text) => handleInput(text));
  }

  function stopScanner() { if (scanner) scanner.stop(); }

  function isTipe(value) {
    value = value.toUpperCase();
    return /[A-Z]/.test(value) && /\d/.test(value);
  }

  async function handleInput(value) {
    if (isLocked) return; // Jika terkunci, abaikan input

    const mode = document.getElementById("mode").value;
    const name = document.getElementById("name").value;
    value = value.trim().toUpperCase();

    isLocked = true; // Langsung kunci proses

    // --- 1. CEK DOUBLE KHUSUS MODE PICKER SAJA ---
    if (mode === "PICKER") {
        if (!isTipe(value) && scannedList.has(value)) {
            log("⚠️ DOUBLE: " + value);
            playErrorRekaman("DOUBLE");
            showAlert("⚠️ Resi DOUBLE: " + value);
            setTimeout(() => { isLocked = false; }, 1500); // Tetap kasih jeda meski error
            return;
        }
    }

    // --- 2. RESPON INSTAN ---
    triggerVisualSuccess();
    playSuccessSound();
    log("✅ Memproses: " + value);
    
    if (mode === "PICKER" && !isTipe(value)) {
        scannedList.add(value);
    }

    // --- 3. KIRIM KE SPREADSHEET ---
    try {
      fetch(GAS_URL, { 
        method: "POST", 
        body: JSON.stringify({ mode, name, resi: value }),
        keepalive: true 
      })
      .then(res => res.json())
      .then(data => {
        if (data.message && (data.message.includes("🚨") || data.message.includes("⚠️"))) {
            log(data.message);
            playErrorRekaman(data.message); 
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            showAlert(data.message); 
            if (mode === "PICKER") scannedList.delete(value);
        } else {
            log(data.message); 
        }
      })
      .catch(err => console.log("Delay jaringan..."));

    } catch (err) {
      console.log("Gagal terhubung ke server.");
    }

    // --- 4. BUKA KUNCI SETELAH 1,5 DETIK ---
    setTimeout(() => {
        isLocked = false;
    }, 1500);
  }

  function submitManual() {
    const input = document.getElementById("manualInput");
    if (!input.value.trim()) return;
    handleInput(input.value);
    input.value = "";
    input.focus();
  }
</script>

</body>
</html>
